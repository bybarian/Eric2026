name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  PROJECT_ID: YOUR_GCP_PROJECT_ID      # Replace with your GCP Project ID
  GAR_LOCATION: YOUR_GAR_REGION        # e.g., us-central1, asia-northeast1
  SERVICE: YOUR_SERVICE_NAME           # e.g., cbme-taiwan-week
  REGION: YOUR_SERVICE_REGION          # e.g., us-central1, asia-northeast1

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    # Add support for Workload Identity Federation (recommended security)
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud using a Service Account Key
      # Set up GCP_SA_KEY in your GitHub repository secrets with your service account JSON key.
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # Alternatively, if you want to use Workload Identity Federation (WIF) instead of keys:
      # - name: Google Auth (WIF)
      #   id: auth
      #   uses: google-github-actions/auth@v2
      #   with:
          # token_format: 'access_token'
          # workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          # service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      # Authenticate Docker to Google Artifact Registry
      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: Build and Push Container
        run: |-
          IMAGE_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          # Secure your environment variables here:
          env_vars: |
            NODE_ENV=production
