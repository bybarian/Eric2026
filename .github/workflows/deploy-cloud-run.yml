name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  PROJECT_ID: YOUR_GCP_PROJECT_ID      # Replace with your GCP Project ID
  GAR_LOCATION: YOUR_GAR_REGION        # e.g., us-central1, asia-northeast1
  SERVICE: YOUR_SERVICE_NAME           # e.g., cbme-taiwan-week
  REGION: YOUR_SERVICE_REGION          # e.g., us-central1, asia-northeast1

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    # Add support for Workload Identity Federation (recommended security)
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Recommended: Authenticate using Workload Identity Federation
      # See: https://github.com/google-github-actions/auth
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}' # Set this secret in GitHub or use service_account_key
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'     # Set this secret in GitHub
          # Alternatively, you can use a classic service account key JSON stored as a GitHub secret:
          # credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # Authenticate Docker to Google Artifact Registry
      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: Build and Push Container
        run: |-
          IMAGE_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          # Secure your environment variables here:
          env_vars: |
            NODE_ENV=production
