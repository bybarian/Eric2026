name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Prevent concurrent runs on the same branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Static Assets
        run: npm run build
        # Note: If deploying to a project page (e.g. username.github.io/repo), 
        # ensure you set "base: '/<repo-name>/'" in your vite.config.ts.

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder the build script populates
          branch: gh-pages # The branch the action should deploy to
